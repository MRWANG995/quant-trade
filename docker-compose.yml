services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: quant
      POSTGRES_PASSWORD: quant
      POSTGRES_DB: quant_trade
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quant -d quant_trade"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "9999:9999"
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://quant:quant@postgres:5432/quant_trade
      BROKER_MODE: paper
      REQUIRE_AUTH: "true"
      ALLOW_REGISTRATION: "false"
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: changeme
      SECRET_KEY: docker-compose-change-me-in-production
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "9998:9998"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9999
      NEXT_PUBLIC_REQUIRE_AUTH: "true"
      PORT: "9998"
    depends_on:
      - backend

volumes:
  pgdata:
